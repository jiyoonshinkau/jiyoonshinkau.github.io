name: GitHub Pages (Jekyll)

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Pages 메타 설정
      - uses: actions/configure-pages@v5

      # ✅ 공식 Jekyll 빌드 액션 (Ruby 셋업/번들 설치까지 알아서)
      - uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      # 산출물 업로드
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/deploy-pages@v4
